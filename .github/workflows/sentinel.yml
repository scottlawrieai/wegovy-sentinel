name: Daily patrol

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  patrol:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Wegovy Sentinel
        env:
          SEMRUSH_API_KEY: ${{ secrets.SEMRUSH_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python sentinel.py

      - name: Commit snapshot history
        if: always()
        run: |
          git config user.name "wegovy-sentinel"
          git config user.email "actions@users.noreply.github.com"
          git add data/snapshots.json docs/snapshots.json data/content.json docs/content.json || true
          git diff --cached --quiet || git commit -m "patrol: $(date -u +%F)"
          git push
